name: Deploy to VM

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: vm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /home/relay/app
            sudo -u relay git pull origin main
            sudo -u relay rm -rf node_modules
            sudo -u relay pnpm install
            sudo -u relay pnpm check
            sudo -u relay pm2 restart pm2.config.cjs --update-env || sudo -u relay pm2 start pm2.config.cjs
